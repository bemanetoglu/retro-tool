version: "2"
type: frontend
tech_stack:
  - JavaScript (Vanilla)
  - Express.js (static file serving)
  - Socket.IO (real-time WebSocket)
  - HTML/CSS (no framework)
routes:
  - path: /
    file: public/index.html
    auth_required: false
    description: Home page with room code join form
  - path: /create-room
    file: public/create-room.html
    auth_required: false
    description: Create a new retrospective room
  - path: /join/:code
    file: public/join.html
    auth_required: false
    description: Join an existing room by entering username
  - path: /room/:code
    file: public/room.html
    auth_required: true
    description: Main retrospective room with Mad/Sad/Glad board
features:
  - name: Home Page Navigation
    description: Navigate to create room or join an existing room
    files:
      - public/index.html
      - public/js/index.js
      - public/js/common.js
    entry_route: /
    user_interactions:
      - Enter 6-digit room code in input field
      - Enter username in input field
      - Click join button to join a room
      - Click create room link to navigate to room creation page
      - Use Ctrl+N shortcut to create new room
    api_calls:
      - method: POST
        endpoint: /api/join-room
    auth_required: false
  - name: Create Room
    description: Create a new retrospective room with name, optional participant limit, and optional time limit
    files:
      - public/create-room.html
      - public/js/create-room.js
      - public/js/common.js
    entry_route: /create-room
    user_interactions:
      - Enter room name (2-50 characters)
      - Optionally set participant limit (1-50)
      - Optionally set time limit in minutes (1-300)
      - Click time limit preset buttons (15/30/45/60 min)
      - Click create room button
      - See success modal with room code and invite link
      - Click copy invite link button
      - Click go to room button to enter the room
    api_calls:
      - method: POST
        endpoint: /api/create-room
    auth_required: false
  - name: Join Room
    description: Join an existing room using a 6-digit code from invite link
    files:
      - public/join.html
      - public/js/join.js
      - public/js/common.js
    entry_route: /join/:code
    user_interactions:
      - Enter username (2-20 characters, alphanumeric + Turkish chars)
      - Click join button
      - See error if username is taken or room is full
    api_calls:
      - method: POST
        endpoint: /api/join-room
    auth_required: false
  - name: Retrospective Board
    description: Main Mad/Sad/Glad board with entry creation, publishing, and real-time updates
    files:
      - public/room.html
      - public/js/room.js
      - public/js/common.js
    entry_route: /room/:code
    user_interactions:
      - Type entry text in Mad/Sad/Glad textarea (max 500 chars)
      - Click add button or press Enter to create draft entry
      - Click publish button to make entry visible to others
      - Click unpublish button to revert entry to draft
      - Click edit button to edit draft entry text
      - Click delete button to remove own entry
      - See real-time entries from other participants
      - See character counter below textarea
      - Use Ctrl+1/2/3 shortcuts to focus Mad/Sad/Glad inputs
    api_calls:
      - method: POST
        endpoint: /api/room/:code/entry
      - method: POST
        endpoint: /api/room/:code/entry/:id/publish
      - method: PUT
        endpoint: /api/room/:code/entry/:id
      - method: DELETE
        endpoint: /api/room/:code/entry/:id
      - method: GET
        endpoint: /api/room/:code
    auth_required: true
  - name: Creator Room Controls
    description: Room creator can start timer, extend time, reopen, terminate, select entries, and export
    files:
      - public/room.html
      - public/js/room.js
    entry_route: /room/:code
    user_interactions:
      - Click start timer button to begin countdown
      - Click extend time button and enter minutes (1-60)
      - Click reopen room button to remove time limit
      - Click terminate retro button to end retrospective
      - Check/uncheck entry checkboxes to select entries for export
      - Click download Excel button to export selected entries
    api_calls:
      - method: POST
        endpoint: /api/room/:code/start
      - method: POST
        endpoint: /api/room/:code/extend-time
      - method: POST
        endpoint: /api/room/:code/reopen
      - method: POST
        endpoint: /api/room/:code/terminate
      - method: POST
        endpoint: /api/room/:code/toggle-entry
      - method: GET
        endpoint: /api/room/:code/export
    auth_required: true
  - name: Entry Rating
    description: Rate other users published entries after retro ends (1-5 stars)
    files:
      - public/js/room.js
    entry_route: /room/:code
    user_interactions:
      - Click star icons (1-5) on other users published entries after retro ends
      - See average rating displayed for own entries (creator view)
    api_calls:
      - method: POST
        endpoint: /api/room/:code/entry/:id/rate
    auth_required: true
  - name: Language Switching
    description: Switch between Turkish, English, German, and Spanish
    files:
      - public/js/common.js
      - public/languages/tr.js
      - public/languages/en.js
      - public/languages/de.js
      - public/languages/es.js
    entry_route: /
    user_interactions:
      - Select language from dropdown selector
      - See all page texts update to selected language
    api_calls: []
    auth_required: false
known_limitations:
  - issue: In-memory storage means all data is lost on server restart
    location: server.js
    impact: Rooms and entries are not persisted across server restarts
  - issue: No authentication system - users identified only by session
    location: server.js
    impact: No password protection, anyone with room code can join
